---
name: Build Bazzite DX
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths-ignore:
      - "**/README.md"
  repository_dispatch:
    types:
      - build
  workflow_dispatch:
    inputs:
      build_untested:
        description: "Build images marked as tested: false"
        type: boolean
        default: false
  merge_group:

env:
  IMAGE_NAME: "${{ github.event.repository.name }}" # the name of the image produced by this build, matches repo names
  IMAGE_DESC: "${{ github.event.repository.description }}"
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}" # do not edit
  ARTIFACTHUB_LOGO_URL: "https://avatars.githubusercontent.com/u/187439889?s=200&v=4"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}-${{ inputs.build_untested || 'false' }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare Matrix
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          # Use yq to generate a JSON array of objects from image-versions.yaml
          # Filter for tested: true unless build_untested is true
          BUILD_UNTESTED="${{ github.event.inputs.build_untested || 'false' }}"

          if [[ "$BUILD_UNTESTED" == "true" ]]; then
            MATRIX=$(yq -o=json -I=0 '.images' image-versions.yaml | tr -d '\n')
          else
            MATRIX=$(yq -o=json -I=0 '.images | [.[] | select(.tested == true)]' image-versions.yaml | tr -d '\n')
          fi

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  build_push:
    name: Build and push image
    needs: prepare
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    env:
      BASE_IMAGE: ${{ matrix.image.name }}

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      # These stage versions are pinned by https://github.com/renovatebot/renovate
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Show disk space
        run: sudo df -h

      - name: Check if /mnt is there
        id: check_mnt
        run: |
          if sudo mountpoint /mnt; then
            echo "mnt_is_there=1" >>$GITHUB_OUTPUT
          else
            echo "mnt_is_there=0" >>$GITHUB_OUTPUT
          fi

      - name: Free Disk Space (Ubuntu)
        if: ${{ steps.check_mnt.outputs.mnt_is_there == '1' }}
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1

      - name: Mount BTRFS for podman storage
        uses: ublue-os/container-storage-action@main
        if: ${{ steps.check_mnt.outputs.mnt_is_there == '1' }}

      - name: Get current date
        id: date
        run: |
          # This generates a timestamp like what is defined on the ArtifactHub documentation
          # E.G: 2022-02-08T15:38:15Z'
          # https://artifacthub.io/docs/topics/repositories/container-images/
          # https://linux.die.net/man/1/date
          echo "date=$(date -u +%Y\-%m\-%d\T%H\:%M\:%S\Z)" >> $GITHUB_OUTPUT

      - name: Extract base image digest
        id: extract_digest
        shell: bash
        run: |
          # Using yq to extract fields separately
          export BASE_IMAGE=$(yq '.images[] | select(.name == "${{ matrix.image.name }}") | .image' image-versions.yaml)
          export BASE_TAG=$(yq '.images[] | select(.name == "${{ matrix.image.name }}") | .tag' image-versions.yaml)
          export BASE_DIGEST=$(yq '.images[] | select(.name == "${{ matrix.image.name }}") | .digest' image-versions.yaml)

          # Fallback if entries are missing
          if [[ -z "$BASE_IMAGE" || "$BASE_IMAGE" == "null" ]]; then
            BASE_IMAGE="ghcr.io/ublue-os/${{ matrix.image.name }}"
          fi
          if [[ -z "$BASE_TAG" || "$BASE_TAG" == "null" ]]; then
            BASE_TAG="latest"
          fi

          echo "base_image=$BASE_IMAGE" >> $GITHUB_OUTPUT
          echo "base_tag=$BASE_TAG" >> $GITHUB_OUTPUT
          echo "base_digest=$BASE_DIGEST" >> $GITHUB_OUTPUT

      # OUTPUTS:
      #   - SOURCE_VERSION: version of the source image. Ex.: testing-41.20250312
      #   - SOURCE_VERSION_MAJOR: major version. Used to identify big releases. Ex.: 41
      - name: Get image major version
        id: fetch_source_meta
        run: |
          set -ex
          # Use the composite image for inspection
          if [[ -n "${{ steps.extract_digest.outputs.base_digest }}" && "${{ steps.extract_digest.outputs.base_digest }}" != "null" ]]; then
            export INSPECT_REF="docker://${{ steps.extract_digest.outputs.base_image }}@${{ steps.extract_digest.outputs.base_digest }}"
          else
            export INSPECT_REF="docker://${{ steps.extract_digest.outputs.base_image }}:${{ steps.extract_digest.outputs.base_tag }}"
          fi

          SOURCE_VERSION=$(
                skopeo inspect --no-tags --raw --config "$INSPECT_REF" | \
                jq -r '.config.Labels["org.opencontainers.image.version"]' 2>/dev/null || echo "null"
          )

          # Fallback to latest tag if not found
          if [[ -z $SOURCE_VERSION || "$SOURCE_VERSION" == "null" ]]; then
            SOURCE_VERSION=$(
                  skopeo inspect --no-tags --raw --config \
                  "docker://ghcr.io/ublue-os/${{ matrix.image.name }}:latest" | \
                  jq -r '.config.Labels["org.opencontainers.image.version"]' 2>/dev/null || echo "null"
            )
          fi

          if [[ -z $SOURCE_VERSION || "$SOURCE_VERSION" == "null" ]]; then
             echo "::error::SOURCE_VERSION could not be fetched."
             exit 1
          fi

          # Source version might be "testing-43.20250312" or just "43.20250312"
          # We want the numeric part only: "43.20250312"
          CLEAN_VERSION=$(echo "$SOURCE_VERSION" | grep -oP '\d+\.\d+' || echo "$SOURCE_VERSION" | grep -oP '\d+')

          # Major version is just the first number: "43"
          SOURCE_VERSION_MAJOR=$(echo "$CLEAN_VERSION" | cut -d. -f1)

          if [[ -z ${SOURCE_VERSION_MAJOR} ]] || (( SOURCE_VERSION_MAJOR <= 0 )); then
            echo "::error::SOURCE_VERSION_MAJOR ($SOURCE_VERSION_MAJOR) is not a valid number"
            exit 1
          fi

          echo "SOURCE_VERSION=$CLEAN_VERSION" >>$GITHUB_OUTPUT
          echo "SOURCE_VERSION_MAJOR=$SOURCE_VERSION_MAJOR" >>$GITHUB_OUTPUT

      - name: Generate output image ref
        id: gen_image_ref
        run: |
          echo "IMAGE_NAME=${BASE_IMAGE/bazzite/bazzite-dx}" | tee -a "$GITHUB_ENV"

      - name: Surface Recipe
        run: |
          set -ex
          # 1. Image References
          export FULL_IMAGE="${{ steps.extract_digest.outputs.full_image }}"
          export NAME="${IMAGE_NAME}"

          # 2. Version Strings from fetch_source_meta
          export VERSION_FULL="${{ steps.fetch_source_meta.outputs.SOURCE_VERSION }}"
          export VERSION_MAJOR="${{ steps.fetch_source_meta.outputs.SOURCE_VERSION_MAJOR }}"

          # 3. Generate Clean Tags (uBlue Standard)
          if [ "${{ matrix.image.tested }}" = "true" ]; then
            export TAGS="latest,stable,${VERSION_FULL},stable-${VERSION_FULL}"
          else
            export TAG_PREFIX="experimental"
            export TAGS="${TAG_PREFIX},${TAG_PREFIX}-${VERSION_FULL}"
          fi

          # 4. Patch Recipe
          # 4. Patch Recipe
          export BASE_IMAGE="${{ steps.extract_digest.outputs.base_image }}"
          export BASE_TAG="${{ steps.extract_digest.outputs.base_tag }}"
          export BASE_DIGEST="${{ steps.extract_digest.outputs.base_digest }}"

          if [[ -n "$BASE_DIGEST" && "$BASE_DIGEST" != "null" ]]; then
            export IMAGE_VERSION_VAL="${BASE_TAG}@${BASE_DIGEST}"
          else
            export IMAGE_VERSION_VAL="${BASE_TAG}"
          fi

          # Apply base fields first
          # Apply base fields
          yq -i '
            .name = env(NAME) |
            .description = "${{ env.IMAGE_DESC }}" |
            .base-image = env(BASE_IMAGE) |
            .image-version = env(IMAGE_VERSION_VAL)
          ' recipes/recipe.yml

          # Apply remaining labels and metadata
          yq -i '
            .alt-tags = (env(TAGS) | split(",") | unique) |
            .labels."io.artifacthub.package.logo-url" = "${{ env.ARTIFACTHUB_LOGO_URL }}" |
            .labels."io.artifacthub.package.readme-url" = "https://raw.githubusercontent.com/${{ github.repository }}/main/README.md" |
            .labels."io.artifacthub.package.maintainers" = "[{\"name\": \"nklowns\", \"email\": \"nklowns@users.noreply.github.com\"}]" |
            .labels."io.artifacthub.package.keywords" = "bootc,bazzite,dx,ublue,universal-blue,fedora,gaming,developer" |
            .labels."io.artifacthub.package.deprecated" = "false" |
            .labels."io.artifacthub.package.prerelease" = "false" |
            .labels."containers.bootc" = "1" |
            .labels."ostree.linux" = "'$(uname -r)'" |
            .labels."org.opencontainers.image.title" = "Bazzite DX" |
            .labels."org.opencontainers.image.description" = "${{ env.IMAGE_DESC }}" |
            .labels."org.opencontainers.image.vendor" = "${{ github.repository_owner }}" |
            .labels."org.opencontainers.image.licenses" = "Apache-2.0" |
            .labels."org.opencontainers.image.source" = "https://github.com/${{ github.repository }}" |
            .labels."org.opencontainers.image.url" = "https://dev.bazzite.gg" |
            .labels."org.opencontainers.image.documentation" = "https://raw.githubusercontent.com/${{ github.repository }}/main/README.md" |
            .labels."org.opencontainers.image.version" = "" + env(VERSION_FULL) |
            .labels."org.opencontainers.image.created" = "'$(date -u +'%Y-%m-%dT%H:%M:%SZ')'" |
            .labels."org.opencontainers.image.revision" = "'${GITHUB_SHA}'"
          ' recipes/recipe.yml

          cp recipes/recipe.yml recipes/build-recipe.yml

      - name: Build and Push with BlueBuild
        uses: blue-build/github-action@v1
        with:
          recipe: build-recipe.yml
          skip_checkout: true
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ secrets.GITHUB_TOKEN }}
          pr_event_number: ${{ github.event.number }}
          maximize_build_space: true
          # Custom build options (conditional signing)
          build_opts: "${{ secrets.SIGNING_SECRET == '' && '--no-sign' || '' }}"

  check:
    name: Check all builds successful
    if: always()
    runs-on: ubuntu-latest
    needs: [build_push]
    steps:
      - name: Check Jobs
        env:
          JOBS: ${{ toJson(needs) }}
        run: |
          echo "Job status:"
          echo $JOBS | jq -r 'to_entries[] | " - \(.key): \(.value.result)"'

          for i in $(echo $JOBS | jq -r 'to_entries[] | .value.result'); do
            if [ "$i" != "success" ] && [ "$i" != "skipped" ]; then
              echo ""
              echo "Status check not okay!"
              exit 1
            fi
          done
