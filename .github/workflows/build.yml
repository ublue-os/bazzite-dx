---
name: Build Bazzite DX
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths-ignore:
      - "**/README.md"
  repository_dispatch:
    types:
      - build
  workflow_dispatch:
    inputs:
      build_untested:
        description: "Build images marked as tested: false"
        type: boolean
        default: false
  merge_group:

env:
  IMAGE_NAME: "${{ github.event.repository.name }}" # the name of the image produced by this build, matches repo names
  IMAGE_DESC: "${{ github.event.repository.description }}"
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}" # do not edit
  ARTIFACTHUB_LOGO_URL: "https://avatars.githubusercontent.com/u/187439889?s=200&v=4"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}-${{ inputs.build_untested || 'false' }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare Matrix
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          # Use yq to generate a JSON array of objects from image-versions.yaml
          # Filter for tested: true unless build_untested is true
          BUILD_UNTESTED="${{ github.event.inputs.build_untested || 'false' }}"

          if [[ "$BUILD_UNTESTED" == "true" ]]; then
            MATRIX=$(yq -o=json -I=0 '.images' image-versions.yaml | tr -d '\n')
          else
            MATRIX=$(yq -o=json -I=0 '.images | [.[] | select(.tested == true)]' image-versions.yaml | tr -d '\n')
          fi

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  build_push:
    name: Build and push image
    needs: prepare
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    env:
      BASE_IMAGE: ${{ matrix.image.name }}

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      # These stage versions are pinned by https://github.com/renovatebot/renovate
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Show disk space
        run: sudo df -h

      - name: Check if /mnt is there
        id: check_mnt
        run: |
          if sudo mountpoint /mnt; then
            echo "mnt_is_there=1" >>$GITHUB_OUTPUT
          else
            echo "mnt_is_there=0" >>$GITHUB_OUTPUT
          fi

      - name: Free Disk Space (Ubuntu)
        if: ${{ steps.check_mnt.outputs.mnt_is_there == '1' }}
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1

      - name: Mount BTRFS for podman storage
        uses: ublue-os/container-storage-action@main
        if: ${{ steps.check_mnt.outputs.mnt_is_there == '1' }}

      - name: Get current date
        id: date
        run: |
          # This generates a timestamp like what is defined on the ArtifactHub documentation
          # E.G: 2022-02-08T15:38:15Z'
          # https://artifacthub.io/docs/topics/repositories/container-images/
          # https://linux.die.net/man/1/date
          echo "date=$(date -u +%Y\-%m\-%d\T%H\:%M\:%S\Z)" >> $GITHUB_OUTPUT

      - name: Extract base image digest
        id: extract_digest
        shell: bash
        run: |
          # Use yq to extract the image + digest for the current matrix member
          # Fallback to latest tag if not found (though Renovate should keep it synced)
          FULL_IMAGE=$(yq '.images[] | select(.name == "${{ matrix.image.name }}") | .image + "@" + .digest' image-versions.yaml)

          # Handle empty digests or dummy 0000... digests
          if [[ -z "$FULL_IMAGE" || "$FULL_IMAGE" == "@" || "$FULL_IMAGE" == *"@sha256:0000"* ]]; then
            echo "::warning::Digest not found or dummy for ${{ matrix.image.name }}. Falling back to ghcr.io/ublue-os/${{ matrix.image.name }}:latest"
            FULL_IMAGE="ghcr.io/ublue-os/${{ matrix.image.name }}:latest"
          fi

          echo "full_image=$FULL_IMAGE" >> $GITHUB_OUTPUT

      # OUTPUTS:
      #   - SOURCE_VERSION: version of the source image. Ex.: testing-41.20250312
      #   - SOURCE_VERSION_MAJOR: major version. Used to identify big releases. Ex.: 41
      - name: Get image major version
        id: fetch_source_meta
        run: |
          set -ex
          # Inspect the actual matrix-specific pinned image
          # If this fails, we'll try latest as a final fallback
          SOURCE_VERSION=$(
                skopeo inspect --no-tags --raw --config \
                "docker://${{ steps.extract_digest.outputs.full_image }}" | \
                jq -r '.config.Labels["org.opencontainers.image.version"]' 2>/dev/null || echo "null"
          )

          # If the above failed, try inspecting the :latest fallback
          if [[ -z $SOURCE_VERSION || "$SOURCE_VERSION" == "null" ]]; then
            echo "::warning::SOURCE_VERSION was not fetched for ${{ steps.extract_digest.outputs.full_image }}. Trying latest tag..."
            SOURCE_VERSION=$(
                  skopeo inspect --no-tags --raw --config \
                  "docker://ghcr.io/ublue-os/${{ matrix.image.name }}:latest" | \
                  jq -r '.config.Labels["org.opencontainers.image.version"]' 2>/dev/null || echo "null"
            )
          fi

          if [[ -z $SOURCE_VERSION || "$SOURCE_VERSION" == "null" ]]; then
             echo "::error::SOURCE_VERSION could not be fetched even for latest tag."
             exit 1
          fi

          echo "SOURCE_VERSION=$SOURCE_VERSION" >>$GITHUB_OUTPUT

          # Extract only the numbers (Fedora Version) from strings like "41" or "testing-41.2025..."
          # We use a more aggressive grep to ensure we only get the numeric part
          SOURCE_VERSION_MAJOR=$(echo "$SOURCE_VERSION" | grep -oP '\d+' | head -n1)

          if [[ -z ${SOURCE_VERSION_MAJOR} ]] || (( SOURCE_VERSION_MAJOR <= 0 )); then
            echo "::error::SOURCE_VERSION_MAJOR ($SOURCE_VERSION_MAJOR) is not a valid number"
            exit 1
          fi

          echo "SOURCE_VERSION_MAJOR=$SOURCE_VERSION_MAJOR" >>$GITHUB_OUTPUT

      - name: Generate output image ref
        id: gen_image_ref
        run: |
          echo "IMAGE_NAME=${BASE_IMAGE/bazzite/bazzite-dx}" | tee -a "$GITHUB_ENV"

      - name: Surface Recipe
        run: |
          set -ex
          # Patch the recipe with the actual matrix name, base-image, and version tag
          # This prevents multiple matrix members from overwriting the same 'bazzite-dx' image
          # We also inject 'alt-tags' here because BlueBuild CLI 0.9.x generates tags 
          # declaratively from the recipe instead of taking --tag arguments.

          FULL_IMAGE="${{ steps.extract_digest.outputs.full_image }}"
          VERSION_MAJOR="${{ steps.fetch_source_meta.outputs.SOURCE_VERSION_MAJOR }}"

          # Fix OCI reference parsing (ensure image:version@sha256 format)
          if [[ "$FULL_IMAGE" == *"@"* ]]; then
            export BASE="${FULL_IMAGE%@*}"
            export BASE="${BASE%:*}" # Strip tag if present
            export VERSION_PATCHED="${VERSION_MAJOR}@${FULL_IMAGE#*@}"
          else
            export BASE="${FULL_IMAGE%:*}"
            export VERSION_PATCHED="${VERSION_MAJOR}"
          fi

          export NAME="${IMAGE_NAME}"
          if [ "${{ matrix.image.tested }}" = "true" ]; then
            export TAGS="latest,stable,${VERSION_MAJOR}"
          else
            export TAGS="experimental,latest-experimental,${VERSION_MAJOR}"
          fi

          yq -i '.name = env(NAME) | .base-image = env(BASE) | .image-version = env(VERSION_PATCHED) | .alt-tags = (env(TAGS) | split(","))' recipes/recipe.yml
          cp recipes/recipe.yml recipes/build-recipe.yml

      - name: Build and Push with BlueBuild
        uses: blue-build/github-action@v1
        with:
          recipe: build-recipe.yml
          skip_checkout: true
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ secrets.GITHUB_TOKEN }}
          pr_event_number: ${{ github.event.number }}
          maximize_build_space: true
          # Custom build options (conditional signing)
          build_opts: "${{ secrets.SIGNING_SECRET == '' && '--no-sign' || '' }}"
          # Rechunk for better optimization
          rechunk: true

  check:
    name: Check all builds successful
    if: always()
    runs-on: ubuntu-latest
    needs: [build_push]
    steps:
      - name: Check Jobs
        env:
          JOBS: ${{ toJson(needs) }}
        run: |
          echo "Job status:"
          echo $JOBS | jq -r 'to_entries[] | " - \(.key): \(.value.result)"'

          for i in $(echo $JOBS | jq -r 'to_entries[] | .value.result'); do
            if [ "$i" != "success" ] && [ "$i" != "skipped" ]; then
              echo ""
              echo "Status check not okay!"
              exit 1
            fi
          done
