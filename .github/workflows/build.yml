---
name: Build Bazzite DX
on:
  repository_dispatch:
    types:
      - build
  merge_group:
  pull_request:
  workflow_dispatch:

env:
  IMAGE_NAME: "${{ github.event.repository.name }}" # the name of the image produced by this build, matches repo names
  IMAGE_DESC: "${{ github.event.repository.description }}"
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}" # do not edit
  ARTIFACTHUB_LOGO_URL: "https://avatars.githubusercontent.com/u/187439889?s=200&v=4"

  # The tag used in the image from which we base of.
  # ex.: ghcr.io/org/image:IMAGE_SOURCE_TAG
  IMAGE_SOURCE_TAG: "stable"
  SOURCE_ORG: "ublue-os"
  SOURCE_REPO: "bazzite"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}-${{ inputs.brand_name}}-${{ inputs.stream_name }}
  cancel-in-progress: true

jobs:
  build_push:
    name: Build and push image
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        base_image:
          - bazzite-deck
          - bazzite-deck-gnome
          - bazzite-deck-nvidia-gnome
          - bazzite-deck-nvidia

    env:
      BASE_IMAGE: ${{ matrix.base_image }}

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      # These stage versions are pinned by https://github.com/renovatebot/renovate
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Show disk space
        run: sudo df -h

      - name: Check if /mnt is there
        id: check_mnt
        run: |
          if sudo mountpoint /mnt; then
            echo "mnt_is_there=1" >>$GITHUB_OUTPUT
          else
            echo "mnt_is_there=0" >>$GITHUB_OUTPUT
          fi

      - name: Free Disk Space (Ubuntu)
        if: ${{ steps.check_mnt.outputs.mnt_is_there == '1' }}
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1

      - name: Mount BTRFS for podman storage
        uses: ublue-os/container-storage-action@main
        if: ${{ steps.check_mnt.outputs.mnt_is_there == '1' }}

      # OUTPUTS:
      #   - SOURCE_VERSION: version of the source image. Ex.: testing-41.20250312
      #   - SOURCE_VERSION_MAJOR: major version. Used to identify big releases. Ex.: 41
      - name: Get image major version
        id: fetch_source_meta
        env:
          org: ${{ env.SOURCE_ORG }}
          IMAGE_SOURCE_TAG: ${{ env.IMAGE_SOURCE_TAG || 'latest' }}
        run: |
          set -x
          # SOURCE_VERSION_MAJOR must be a number
          declare -i SOURCE_VERSION_MAJOR=0

          # There are some ways to get the major release from an image.
          # First method: `skopeo inspect` and annotations.

          SOURCE_VERSION=$(
                skopeo inspect --no-tags --raw --config \
                "docker://ghcr.io/${org}/${BASE_IMAGE}:${IMAGE_SOURCE_TAG}" | \
                jq -r '.config.Labels["org.opencontainers.image.version"]'
          )
          if [[ -z $SOURCE_VERSION ]]; then
            echo "::error::$SOURCE_VERSION was not fetched correctly: $SOURCE_VERSION=${$SOURCE_VERSION}"
            exit 1
          fi
          echo "SOURCE_VERSION=$SOURCE_VERSION" >>$GITHUB_OUTPUT

          SOURCE_VERSION_MAJOR=$([[ ${SOURCE_VERSION} =~ ^(.*-)?([[:digit:]]+) ]] && echo "${BASH_REMATCH[-1]}")
          _status=$?
          unset -v _tag

          if [[ $_status -ne 0 ]] || [[ -z ${SOURCE_VERSION_MAJOR} ]] || (( SOURCE_VERSION_MAJOR <= 0 )); then
            echo "::error::SOURCE_VERSION_MAJOR was not fetched correctly: SOURCE_VERSION_MAJOR=${SOURCE_VERSION_MAJOR}"
            exit 1
          fi

          echo "SOURCE_VERSION_MAJOR=$SOURCE_VERSION_MAJOR" >>$GITHUB_OUTPUT

      - name: Generate output image ref
        id: gen_image_ref
        run: |
          echo "IMAGE_NAME=${BASE_IMAGE/bazzite/bazzite-dx}" | sed 's/-deck//' | tee -a "$GITHUB_ENV"

      # Generate a file with all the build-args passed to buildah
      - name: Prepare build args file
        run: |
          cat <<'EOF' >>build_args.txt
          BASE_IMAGE=ghcr.io/${{ env.SOURCE_ORG }}/${{ matrix.base_image }}:${{ env.IMAGE_SOURCE_TAG || 'latest' }}
          IMAGE_NAME=${{ env.IMAGE_NAME }}
          IMAGE_VENDOR=${{ github.repository_owner }}
          EOF

      # Build image using buildah and save it to raw-img
      - name: Build Image
        id: build_image
        run: |
          sudo -E buildah build \
            --build-arg-file build_args.txt \
            --tag raw-img .

      # Relabel the image with Bazzite DX labels
      - name: Apply Labels
        id: relabel
        env:
          IMAGE_LABELS: |
            io.artifacthub.package.readme-url=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/refs/heads/main/README.md
            org.opencontainers.image.description=${{ env.IMAGE_DESC }}
            org.opencontainers.image.documentation=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/refs/heads/main/README.md
            org.opencontainers.image.source=https://github.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/blob/main/Containerfile
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.url=https://github.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            io.artifacthub.package.deprecated=false
            io.artifacthub.package.keywords=bootc,ublue,universal-blue
            io.artifacthub.package.license=Apache-2.0
            io.artifacthub.package.logo-url=${{ env.ARTIFACTHUB_LOGO_URL }}
            io.artifacthub.package.prerelease=false
            containers.bootc=1
        run: |
          version="${{ steps.fetch_source_meta.outputs.SOURCE_VERSION_MAJOR }}.$(date +%Y%m%d)"

          # Figure out config
          mapfile -t labels <<< "$IMAGE_LABELS"
          labels+=(
            "org.opencontainers.image.version=$version"
            "org.opencontainers.image.created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          )

          # Apply config to labels and annotations
          container=$(sudo buildah from raw-img)
          for line in "${labels[@]}"; do
            [ -z "$line" ] && continue
            sudo buildah config --label "$line" --annotation "$line" "$container"
          done
          sudo buildah commit --identity-label=false --rm $container raw-img

          echo "version=$version" >> "$GITHUB_OUTPUT"

      # Reprocess raw-img using rechunker which will delete it
      - name: Run Rechunker
        id: rechunk
        run: |
          container=$(sudo buildah from raw-img)
          mnt=$(sudo buildah mount $container)
          sudo bash -c "rm -rf $mnt/run/.* $mnt/run/* $mnt/tmp/.* $mnt/tmp/*"
          sudo buildah umount $container
          sudo buildah commit --identity-label=false --rm $container raw-img

          sudo podman run --rm --privileged --volume /var/lib/containers:/var/lib/containers \
              localhost/raw-img \
              rpm-ostree compose build-chunked-oci \
              --bootc --max-layers 127 --format-version 2 \
              --from localhost/raw-img --output containers-storage:localhost/chunked-img
          sudo podman untag raw-img

          echo "ref=containers-storage:localhost/chunked-img" >> "$GITHUB_OUTPUT"

      # Generate tags after relabel runs
      - name: Generate tags
        id: generate-tags
        shell: bash
        run: |
          # Common vars for generating tags
          VERSION_TAG="${{ steps.relabel.outputs.version }}"

          BUILD_TAGS=("stable-${VERSION_TAG}" "latest" "stable" "stable-${{ steps.fetch_source_meta.outputs.SOURCE_VERSION_MAJOR }}")

          echo "Generated the following build tags: "
          for TAG in "${BUILD_TAGS[@]}"; do
              echo "${TAG}"
          done
          echo "alias_tags=${BUILD_TAGS[*]}" >> $GITHUB_OUTPUT

      # These `if` statements are so that pull requests for your custom images do not make it publish any packages under your name without you knowing
      # They also check if the runner is on the default branch so that things like the merge queue (if you enable it), are going to work
      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | sudo podman login ghcr.io -u ${{ github.actor }} --password-stdin
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # Workaround bug where capital letters in your GitHub username make it impossible to push to GHCR.
      # https://github.com/macbre/push-to-ghcr/issues/12
      - name: Lowercase Image and Registry
        id: lowercase
        env:
          IMAGE_REGISTRY: ${{ env.IMAGE_REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          set -x
          echo "registry=${IMAGE_REGISTRY,,}" >> $GITHUB_OUTPUT
          echo "image=${IMAGE_NAME,,}" >> $GITHUB_OUTPUT

      # Push the image to GHCR (Image Registry)
      - name: Push to GHCR
        id: push
        if: github.event_name != 'pull_request'
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        env:
          ALIAS_TAGS: ${{ steps.generate-tags.outputs.alias_tags }}
          OUTPUT_IMAGE: ${{ steps.lowercase.outputs.registry }}/${{ steps.lowercase.outputs.image }}
          RECHUNK_REF: ${{ steps.rechunk.outputs.ref }}
          VERSION: ${{ steps.relabel.outputs.version }}
        with:
          max_attempts: 3
          retry_wait_seconds: 15
          timeout_minutes: 10
          command: |
            log_sum() { echo "$1" >> $GITHUB_STEP_SUMMARY; }
            log_sum '# Push to GHCR result'
            log_sum '```'

            dest_image="${OUTPUT_IMAGE}:${VERSION}"
            sudo skopeo copy ${RECHUNK_REF} docker://$dest_image
            log_sum "$dest_image"

            for tag in ${ALIAS_TAGS}; do
              dest_image="${OUTPUT_IMAGE}:$tag"
              sudo skopeo copy ${RECHUNK_REF} docker://$dest_image
              log_sum "$dest_image"
            done
            log_sum '```'

            digest=$(sudo skopeo inspect --format '{{.Digest}}' docker://${OUTPUT_IMAGE}:${VERSION})
            echo "digest=${digest}" >> $GITHUB_OUTPUT

      # This section is optional and only needs to be enabled if you plan on distributing
      # your project for others to consume. You will need to create a public and private key
      # using Cosign and save the private key as a repository secret in Github for this workflow
      # to consume. For more details, review the image signing section of the README.
      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
        with:
          cosign-release: "v2.6.1"

      - name: Sign container image
        if: github.event_name != 'pull_request'
        run: |
          cosign sign -y --key env://COSIGN_PRIVATE_KEY --new-bundle-format=false ${{ steps.lowercase.outputs.registry }}/${{ steps.lowercase.outputs.image }}@${{ steps.push.outputs.digest }}
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}

  check:
    name: Check all builds successful
    if: always()
    runs-on: ubuntu-latest
    needs: [build_push]
    steps:
      - name: Check Jobs
        env:
          JOBS: ${{ toJson(needs) }}
        run: |
          echo "Job status:"
          echo $JOBS | jq -r 'to_entries[] | " - \(.key): \(.value.result)"'

          for i in $(echo $JOBS | jq -r 'to_entries[] | .value.result'); do
            if [ "$i" != "success" ] && [ "$i" != "skipped" ]; then
              echo ""
              echo "Status check not okay!"
              exit 1
            fi
          done
