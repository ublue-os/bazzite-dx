# Bazzite-DX Global Environment
# This ensures a "Zero-Conf" experience where developer tools are available
# in both interactive shells and GUI applications (IDE integration).

# Homebrew/Linuxbrew Path Integration
PATH="/home/linuxbrew/.linuxbrew/bin:/home/linuxbrew/.linuxbrew/sbin:$PATH"

# Homebrew Standard Variables
HOMEBREW_PREFIX="/home/linuxbrew/.linuxbrew"
HOMEBREW_CELLAR="/home/linuxbrew/.linuxbrew/Cellar"
HOMEBREW_REPOSITORY="/home/linuxbrew/.linuxbrew/Homebrew"

# DX Defaults
EDITOR="nano"
VISUAL="nano"
PAGER="cat"
