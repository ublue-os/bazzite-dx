---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: bazzite-dx
description: Developer Experience (DX) layer for Bazzite. Matrix-ready and Universal.

base-image: ghcr.io/ublue-os/bazzite-deck
image-version: stable

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    repos:
      copr:
        - karmab/kcli
        - gmaglione/podman-bootc
        - ublue-os/packages
    install:
      packages:
        - kcli
        - podman-bootc
        - ublue-setup-services
        - ublue-os-libvirt-workarounds

  - type: rpm-ostree
    repos:
      - https://download.docker.com/linux/fedora/docker-ce.repo
    install:
      - containerd.io
      - docker-buildx-plugin
      - docker-ce
      - docker-ce-cli
      - docker-compose-plugin
      - docker-model-plugin
      - podman-compose
      - podman-machine
      - podman-tui
      - libvirt
      - libvirt-nss
      - virt-manager
      - virt-viewer
      - virt-v2v
      - edk2-ovmf
      - qemu-kvm
      - qemu-img
      - swtpm
      - swtpm-tools
      - incus
      - incus-agent
      - lxc

  - type: rpm-ostree
    install:
      - android-tools
      - flatpak-builder
      - git-subtree
      - git-svn
      - ccache
      - zsh

  - type: rpm-ostree
    install:
      - bcc
      - bpftop
      - bpftrace
      - iotop
      - nicstat
      - numactl
      - sysprof
      - tiptop
      - trace-cmd
      - udica
      - osbuild-selinux

  - type: rpm-ostree
    install:
      - dbus-x11
      - genisoimage
      - util-linux-script
      - ydotool
      - python3-ramalama
      - rclone
      - restic
      - usbmuxd
      - libimobiledevice-utils
      - cockpit-bridge
      - cockpit-ws
      - cockpit-system
      - cockpit-ostree
      - cockpit-podman
      - cockpit-machines
      - cockpit-packagekit
      - cockpit-networkmanager
      - cockpit-storaged
      - cockpit-selinux
      - pcp
      - rocm-smi

  - type: fonts
    fonts:
      nerd-fonts:
        - FiraCode
        - Hack
        - JetBrainsMono
      google-fonts:
        - Inter
        - Outfit
        - Roboto

  - type: default-flatpaks
    configurations:
      - notify: false
        scope: system
        repo:
          url: https://dl.flathub.org/repo/flathub.flatpakrepo
          name: flathub
        install:
          - com.mattjakeman.ExtensionManager
          - org.gnome.Boxes
          - io.missioncenter.MissionCenter
          - com.rtosta.zapzap

  - type: brew

  - type: systemd
    system:
      enabled:
        - docker.socket
        - podman.socket
        - bazzite-dx-groups.service
        - libvirt-workaround.service
        - incus-workaround.service
        - swtpm-workaround.service
        - ublue-system-setup.service
        - input-remapper.service
        - cockpit.socket
        - uupd.timer
    user:
      enabled:
        - ublue-user-setup.service

  - type: script
    scripts:
      - 00-image-info.sh
      - 10-android-udev.sh
      - 20-variant-adjust.sh
      - 60-clean-base.sh
      - 99-build-initramfs.sh
      - 80-disable-repos.sh
      - 90-validate-repos.sh
      - 999-cleanup.sh

  - type: dx-verify
    source: local

  - type: os-release
    properties:
      ID: bazzite-dx
      NAME: "Bazzite DX"
      PRETTY_NAME: "Bazzite Developer Experience"
      DEFAULT_HOSTNAME: bazzite-dx
      DOC_URL: "https://dev.bazzite.gg/"

  - type: signing
