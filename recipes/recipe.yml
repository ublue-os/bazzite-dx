---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: bazzite-dx
description: Developer Experience (DX) layer for Bazzite. Matrix-ready and Universal.

base-image: ghcr.io/ublue-os/bazzite
image-version: latest

alt-tags:
  - stable
  - "43"

labels:
  org.opencontainers.image.version: "43"

modules:
  # ==========================================
  # LAYER 1: FOUNDATION (Files & Build Core)
  # ==========================================
  - type: files
    files:
      - source: system
        destination: /

  # ==========================================
  # LAYER 2: SYSTEM TOOLS & VIRTUALIZATION
  # ==========================================
  - type: dnf
    repos:
      cleanup: true
      copr:
        - karmab/kcli
        - gmaglione/podman-bootc
        - ublue-os/packages
    install:
      packages:
        - kcli
        - podman-bootc
        - ublue-setup-services
        - ublue-os-libvirt-workarounds

  - type: rpm-ostree
    repos:
      - https://download.docker.com/linux/fedora/docker-ce.repo
    install:
      # Virtualization & Containers
      - containerd.io
      - docker-buildx-plugin
      - docker-ce
      - docker-ce-cli
      - docker-compose-plugin
      - docker-model-plugin
      - podman-compose
      - podman-machine
      - podman-tui
      - libvirt
      - libvirt-nss
      - virt-manager
      - virt-viewer
      - virt-v2v
      - edk2-ovmf
      - qemu-kvm
      - qemu-img
      - swtpm
      - swtpm-tools
      - incus
      - incus-agent
      - lxc
      # Observability & Analysis
      - bcc
      - bpftop
      - bpftrace
      - iotop
      - nicstat
      - numactl
      - sysprof
      - tiptop
      - trace-cmd
      - udica
      - osbuild-selinux
      - cockpit-bridge
      - cockpit-ws
      - cockpit-system
      - cockpit-ostree
      - cockpit-podman
      - cockpit-machines
      - cockpit-packagekit
      - cockpit-networkmanager
      - cockpit-storaged
      - cockpit-selinux
      - pcp
      - rocm-smi
      # Workstation Tools
      - android-tools
      - flatpak-builder
      - git-subtree
      - git-svn
      - ccache
      - zsh
      - dbus-x11
      - genisoimage
      - util-linux-script
      - ydotool
      - python3-ramalama
      - ramalama
      - rclone
      - restic
      - usbmuxd
      - libimobiledevice-utils

  - type: systemd
    system:
      enabled:
        - docker.socket
        - podman.socket
        - libvirt-workaround.service
        - swtpm-workaround.service
        - bazzite-dx-groups.service
        - cockpit.socket
        - uupd.timer
        - input-remapper.service

  # ==========================================
  # LAYER 3: EXPERIENCE (Fonts & Initramfs)
  # ==========================================
  - type: fonts
    fonts:
      nerd-fonts:
        - FiraCode
        - Hack
        - JetBrainsMono
      google-fonts:
        - Inter
        - Outfit

  - type: initramfs

  # ==========================================
  # LAYER 4: CUSTOMIZATIONS (Scripts & Configs)
  # ==========================================
  - type: dx-image-info
    source: local

  - type: dx-udev
    source: local

  - type: default-flatpaks
    configurations:
      - notify: false
        scope: system
        repo:
          url: https://dl.flathub.org/repo/flathub.flatpakrepo
          name: flathub
        install:
          - com.mattjakeman.ExtensionManager
          - org.gnome.Boxes
          - io.missioncenter.MissionCenter
          - com.rtosta.zapzap

  - type: justfiles
    include:
      - 95-bazzite-dx.just

  # ==========================================
  # LAYER 5: HARDENING & VERIFICATION (The Polish)
  # ==========================================
  - type: dx-hardening
    source: local

  - type: dx-verify
    source: local

  - type: os-release
    properties:
      ID: bazzite-dx
      NAME: "Bazzite DX"
      PRETTY_NAME: "Bazzite Developer Experience"
      DEFAULT_HOSTNAME: bazzite-dx
      DOC_URL: "https://dev.bazzite.gg/"

  - type: signing
